<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marte - AstroBlog</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Navbar (uguale alla home) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <!-- ... (stesso contenuto della navbar della home) ... -->
    </nav>

    <!-- Hero Section -->
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4">Marte</h1>
            <p class="lead">Il Pianeta Rosso</p>
        </div>
    </header>

    <!-- Planet Carousel -->
    <div id="marsCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#marsCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#marsCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#marsCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/api/placeholder/1200/400" class="d-block w-100" alt="Superficie di Marte">
                <div class="carousel-caption">
                    <h3>Olympus Mons</h3>
                    <p>Il vulcano più grande del Sistema Solare</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="/api/placeholder/1200/400" class="d-block w-100" alt="Valli di Marte">
                <div class="carousel-caption">
                    <h3>Valles Marineris</h3>
                    <p>Il più grande sistema di canyon del Sistema Solare</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="/api/placeholder/1200/400" class="d-block w-100" alt="Calotte polari">
                <div class="carousel-caption">
                    <h3>Calotte Polari</h3>
                    <p>Ghiaccio d'acqua e anidride carbonica ai poli</p>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#marsCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#marsCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- Main Content -->
    <div class="container my-5">
        <!-- Quick Facts -->
        <div class="fact-box">
            <h3>Dati principali</h3>
            <div class="row">
                <div class="col-md-3">
                    <strong>Diametro:</strong> 6.779 km
                </div>
                <div class="col-md-3">
                    <strong>Massa:</strong> 6,39
